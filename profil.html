<html>
  <head>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding: 40px;
        display: flex;
        justify-content: center;
      }
      .profile-box {
        width: 400px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        padding: 30px;
        border-top: 6px solid #667eea;
      }
      .img-circle {
        width: 80px;
        height: 80px;
        background: #edf2f7;
        border-radius: 50%;
        margin: 0 auto 20px;
        line-height: 80px;
        font-size: 30px;
        color: #667eea;
      }
      h3 {
        margin: 10px 0;
        color: #2d3748;
      }
      .details {
        background: #f7fafc;
        padding: 15px;
        border-radius: 12px;
        margin-top: 20px;
      }
      .tag {
        background: #667eea;
        color: white;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <div class="profile-box">
      <div class="img-circle">C</div>
      <h3>Angelo Pandoh Chandra</h3>
      <span class="tag">Mahasiswa IT</span>
      <div class="details">
        <p><strong>NIM:</strong> 231011450196</p>
        <p><strong>Kelas:</strong> 02TPLP005</p>
      </div>
    </div>
  </body>
</html>
