<html>
  <head>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .card {
        padding: 50px;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      }
      h3 {
        font-size: 2.5em;
        background: linear-gradient(45deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }
      p {
        color: #718096;
        font-size: 1.2em;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>Selamat Datang</h3>
      <p>Silakan gunakan menu di samping untuk melihat hasil tugas saya.</p>
    </div>
  </body>
</html>
