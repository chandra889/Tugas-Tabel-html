<html>
  <head>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 40px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
      }
      caption {
        font-weight: bold;
        padding: 15px;
        color: #4a5568;
        font-size: 1.1em;
      }
      th {
        background: #4a5568;
        color: white;
        padding: 15px;
        text-transform: uppercase;
        font-size: 0.9em;
      }
      td {
        padding: 12px 20px;
        border-bottom: 1px solid #edf2f7;
        color: #4a5568;
        text-align: center;
      }
      tr:nth-child(even) {
        background: #f7fafc;
      }
      tr:hover {
        background: #edf2f7;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        BIODATA SISWA (ROWSPAN)
      </caption>
      <tr>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Telepon</th>
      </tr>
      <tr>
        <td rowspan="3">Angga Kusuma</td>
        <td rowspan="3">Jl. Kamboja 2, Jakarta</td>
        <td>021 - 55667788</td>
      </tr>
      <tr>
        <td>08131445689</td>
      </tr>
      <tr>
        <td>021 - 56788901</td>
      </tr>
    </table>

    <table>
      <caption>
        BIODATA SISWA (COLSPAN)
      </caption>
      <tr>
        <th>Nama</th>
        <th>Alamat</th>
        <th colspan="3">Telepon</th>
      </tr>
      <tr>
        <td>Endar Nirmala</td>
        <td>Jl. Rasamala 3, Jakarta</td>
        <td>021-5678910</td>
        <td>0812285104</td>
        <td>021-56788901</td>
      </tr>
    </table>
  </body>
</html>
